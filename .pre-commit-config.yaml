# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2025 The Linux Foundation

ci:
  # pre-commit.ci sandbox prevents network calls; disable gha-workflow-linter.
  # aislop also runs engines that can call the network at scan time
  # (dependency audits), so it cannot run in the sandbox either.
  skip: [gha-workflow-linter, aislop]
  autofix_commit_msg: |
    Chore: pre-commit autofixes

    Signed-off-by: pre-commit-ci[bot] <pre-commit-ci@users.noreply.github.com>
  autoupdate_commit_msg: |
    Chore: pre-commit autoupdate

    Signed-off-by: pre-commit-ci[bot] <pre-commit-ci@users.noreply.github.com>

exclude: "^docs/conf.py"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: trailing-whitespace
        files: ^\.github/
      - id: check-added-large-files
        files: ^\.github/
      - id: check-ast
        files: ^\.github/
      - id: check-json
        files: ^\.github/
      - id: check-merge-conflict
        files: ^\.github/
      - id: check-xml
        files: ^\.github/
      - id: check-yaml
        files: ^\.github/
      - id: debug-statements
        files: ^\.github/
      - id: end-of-file-fixer
        files: ^\.github/
      - id: requirements-txt-fixer
        files: ^\.github/.*requirements.*\.txt$
      - id: mixed-line-ending
        args: ["--fix=lf"]
        files: ^\.github/
      - id: no-commit-to-branch
        args:
          - --branch=dev
          - --branch=master
          - --branch=main
          - --branch=rc
          - --branch=production

  - repo: https://github.com/jorisroovers/gitlint
    rev: acc9d9de6369b76d22cb4167029d2035e8730b98 # frozen: v0.19.1
    hooks:
      - id: gitlint

  - repo: https://github.com/adrienverge/yamllint.git
    rev: cba56bcde1fdd01c1deb3f945e69764c291a6530  # frozen: v1.38.0
    hooks:
      - id: yamllint
        types: [yaml]
        files: ^\.github/

#  - repo: https://github.com/astral-sh/ruff-pre-commit
#    rev: c59bba8fb259db0fec2bbb77ad8ba51ea7341b56  # frozen: v0.15.20
#    hooks:
#      - id: ruff
#        files: ^(scripts|tests|custom_components)/.+\.py$
#        args: [--fix, --exit-non-zero-on-fix]
#      - id: ruff-format
#        files: ^(scripts|tests|custom_components)/.+\.py$

#  - repo: https://github.com/pre-commit/mirrors-mypy
#    rev: d2823d321df3af8f878f7ee3414dc94d037145b9  # frozen: v2.1.0
#    hooks:
#      - id: mypy

  - repo: https://github.com/btford/write-good
    rev: ab66ce10136dfad5146e69e70f82a3efac8842c1 # frozen: v1.0.8
    hooks:
      - id: write-good
        files: "^\\.github/.*\\.(rst|md|markdown|mdown|mkdn)$"

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: 745eface02aef23e168a8afb6b5737818efbea95  # frozen: v0.11.0.1
    hooks:
      - id: shellcheck
        files: ^\.github/

#  - repo: https://github.com/igorshubovych/markdownlint-cli
#    rev: a4d5d37e66ebcd6b3705204a1d6dbb56dea66338  # frozen: v0.49.0
#    hooks:
#      - id: markdownlint
#        args: ["--fix"]

#  - repo: https://github.com/fsfe/reuse-tool
#    rev: 9fabf9eb815a57aac116b435e8346c200cdb8604  # frozen: v6.2.0
#    hooks:
#      - id: reuse

  # Replaces: https://github.com/rhysd/actionlint
  # Permits actionlint to run both locally and with precommit.ci/GitHub
  - repo: https://github.com/Mateusz-Grzelinski/actionlint-py
    rev: c04ed26e40637cab1aa9879c693832a9c120fb20  # frozen: v1.7.12.24
    hooks:
      - id: actionlint

  # Check for misspellings in documentation files
  - repo: https://github.com/codespell-project/codespell
    rev: 2ccb47ff45ad361a21071a7eedda4c37e6ae8c5a  # frozen: v2.4.2
    hooks:
      - id: codespell
        files: ^\.github/

#  # Requires a mirror, primary repo lacks .pre-commit-hooks.yaml
#  - repo: https://github.com/DetachHead/basedpyright-prek-mirror
#    rev: d55eabd2531b4f4a4c49c30fba627ce3a636ab79  # frozen: 1.39.9
#    hooks:
#      - id: basedpyright

  - repo: https://github.com/lfreleng-actions/gha-workflow-linter
    rev: 4c3079dcb6e9e3c295f961ce5bd5b8585db698ca  # frozen: v1.2.2
    hooks:
      - id: gha-workflow-linter

  # Catch AI slop developer-side before it reaches a pull request.
  # Runs the full-repository quality gate, scored against
  # .aislop/config.yml (failBelow: 100). A local hook installing the
  # published npm package: the scanaislop/aislop git repository does
  # not ship the built dist/, so its bundled pre-commit hook cannot
  # install. Bump the pinned version here manually when new aislop
  # releases ship.
#  - repo: local
#    hooks:
#      - id: aislop
#        name: aislop
#        entry: aislop ci --human
#        language: node
#        additional_dependencies: ["aislop@0.13.1"]
#        pass_filenames: false
#        always_run: true

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 1a4bb160cab6417b3045e1b37b6b72449243e658  # frozen: 0.37.4
    hooks:
      - id: check-github-actions
      - id: check-github-workflows
      - id: check-jsonschema
        name: Check GitHub Workflows set timeout-minutes
        args:
          - --builtin-schema
          - github-workflows-require-timeout
        files: ^\.github/workflows/[^/]+$
        types:
          - yaml
      - id: check-readthedocs
