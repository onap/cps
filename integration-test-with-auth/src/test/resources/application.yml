rest:
  api:
    cps-base-path: /cps/api
    ncmp-base-path: /ncmp
    ncmp-inventory-base-path: /ncmpInventory
    provmns-base-path: /ProvMnS
    provmns-extensions-base-path: /prov-mns-extensions

security:
  auth:
    enabled: true

spring:
  main:
    banner-mode: off
  application:
    name: cps-security-test
  jpa:
    properties:
      hibernate.enable_lazy_load_no_trans: true
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
      hibernate.id.new_generator_mappings: true
      hibernate.jdbc.batch_size: 100
    show-sql: false
    ddl-auto: create
    open-in-view: false
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driverClassName: org.postgresql.Driver
    hikari:
      minimumIdle: 5
      maximumPoolSize: 80
      idleTimeout: 60000
      connectionTimeout: 30000
      leakDetectionThreshold: 30000
      pool-name: CpsDatabasePool
  cache:
    type: caffeine
    cache-names: yangSchema
    caffeine:
      spec: maximumSize=10000,expireAfterAccess=10m
  liquibase:
    change-log: classpath:changelog/changelog-master.yaml
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVER:localhost:9092}
    security:
      protocol: PLAINTEXT
    producer:
      value-serializer: io.cloudevents.kafka.CloudEventSerializer
      client-id: cps-core
    consumer:
      group-id: ${NCMP_CONSUMER_GROUP_ID:ncmp-group}
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: io.cloudevents.kafka.CloudEventDeserializer
        spring.json.use.type.headers: false
  jackson:
    default-property-inclusion: NON_NULL
    serialization:
      FAIL_ON_EMPTY_BEANS: false
  sql:
    init:
      mode: ALWAYS
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9876/.well-known/jwks.json

app:
  ncmp:
    async-m2m:
      topic: ncmp-async-m2m
    avc:
      cm-subscription-ncmp-in: subscription
      cm-subscription-dmi-in: ncmp-dmi-cm-avc-subscription
      cm-subscription-dmi-out: dmi-ncmp-cm-avc-subscription
      cm-events-topic: cm-events
      inventory-events-topic: ncmp-inventory-events
    provmns:
      max-patch-operations: 10
  lcm:
    events:
      topic: ncmp-events
  dmi:
    cm-events:
      topic: dmi-cm-events
    device-heartbeat:
      topic: dmi-device-heartbeat
  cps:
    data-updated:
      change-event-notifications-enabled: false
      topic: cps-data-updated-events

notification:
  enabled: false

ncmp:
  dmi:
    httpclient:
      connectionTimeoutInSeconds: 30
      maximumConnectionsPerRoute: 50
      maximumConnectionsTotal: 100
      idleConnectionEvictionThresholdInSeconds: 5
      maximumInMemorySizeInMegabytes: 16
    auth:
      username: dmi
      password: dmi
      enabled: false
    api:
      base-path: dmi
  timers:
    advised-modules-sync:
      sleep-time-ms: 1000000
    cm-handle-data-sync:
      sleep-time-ms: 30000
    model-loader:
      retry-time-ms: 1000
    trust-level:
      dmi-availability-watchdog-ms: 30000
  model-loader:
    maximum-attempt-count: 20
  policy-executor:
    enabled: false
    defaultDecision: allow
    server:
      address: http://localhost
      port: 8790

hazelcast:
  cluster-name: cps-security-test-caches
  instance-config-name: cps-security-test-hazelcast-config
  mode:
    kubernetes:
      enabled: false
      service-name: cps-security-test-service

cps:
  tracing:
    enabled: false
    exporter:
      protocol: grpc
