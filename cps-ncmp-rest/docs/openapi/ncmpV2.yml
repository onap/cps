searchCmHandlesLightweight:
  post:
    description: Execute cm handle query search and return a list of lightweight cm handle details (essential properties only). Any number of conditions can be applied.
    tags:
      - network-cm-proxy
    summary: Execute lightweight cm handle search
    operationId: searchCmHandlesLightweight
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: 'components.yaml#/components/schemas/CmHandleQueryParameters'
    responses:
      200:
        description: OK
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: 'components.yaml#/components/schemas/RestOutputCmHandleLightweight'
      400:
        $ref: 'components.yaml#/components/responses/BadRequest'
      403:
        $ref: 'components.yaml#/components/responses/Forbidden'
      500:
        $ref: 'components.yaml#/components/responses/InternalServerError'

retrieveCmHandleDetailsByIdLightweight:
  get:
    description: Retrieve lightweight CM handle details (essential properties only) by cm handle reference
    tags:
      - network-cm-proxy
    summary: Retrieve lightweight CM handle details
    operationId: retrieveCmHandleDetailsByIdLightweight
    parameters:
      - $ref: 'components.yaml#/components/parameters/cmHandleReferenceInPath'
    responses:
      200:
        description: OK
        content:
          application/json:
            schema:
              $ref: 'components.yaml#/components/schemas/RestOutputCmHandleLightweight'
      400:
        $ref: 'components.yaml#/components/responses/BadRequest'
      404:
        $ref: 'components.yaml#/components/responses/NotFound'
      500:
        $ref: 'components.yaml#/components/responses/InternalServerError'
