openapi: 3.0.1
info:
  title: Provisioning MnS Extensions API
  version: 1.0.0-alpha.1+1
  description: >-
    This API provides additional vendor specific features on top of the Provisioning MnS standard API.
  x-api-id: 4b6ec993-ac1d-4c4c-8000-50e9892e1cc6
  x-audience: external-public
  license:
    name: Copyright (C) 2026 OpenInfra Foundation Europe. All rights reserved.
  contact:
    name: CPS team
    url: https://lf-onap.atlassian.net/wiki/spaces/DW/pages/16442177/Configuration+Persistence+Service+Developer+s+Landing+Page
    email: cpsteam@est.tech
servers:
  - url: 'https://{host}/prov-mns-extensions/v1alpha1'
    variables:
      host:
        description: Service host name
        default: localhost
paths:
  '/actions/{distinguishedName}/{action}':
    post:
      operationId: executeAction
      tags:
        - action
      summary: Execute a Managed Object action
      description: Execute a Managed Object action identified by the URI path with supplied input parameters if there are any.
      parameters:
        - name: distinguishedName
          in: path
          required: true
          schema:
            type: string
          description: Slash separated DN to the Managed Object. This parameter must not be URL encoded.
          example: /SubNetwork=SN1/MeContext=XY/ManagedElement=Z/Equipment=1/FieldReplaceableUnit=11
        - name: action
          in: path
          required: true
          schema:
            type: string
            description: The name of the Managed Object action.
          example: restartUnit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActionRequest'
      responses:
        '201':
          description: >-
            Created - This status code is returned when the action has been successfully executed.
            The action execution result is returned in the response message body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResponse'
        '202':
          description: >-
            Accepted - This status code may be returned only when the action response has no message body.
            The action execution result is not yet available, the action is executed asynchronously.
        default:
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDefault'
components:
  schemas:
    ErrorResponseDefault:
      type: object
      properties:
        otherProblems:
          type: array
          items:
            type: object
      required:
        - type
    ActionRequest:
      type: object
      properties:
        customProperties:
          type: object
          additionalProperties: true
          description: A dynamic set of custom properties provided by client

        value:
          type: object
          properties:
            input:
              type: object
      additionalProperties: true
      example:
        customProperties:
          technology-type: NR
          location: Dublin
        input:
          restartRank: 1
          restartReason: 0
          restartInfo: apply changes for use case X
    ActionResponse:
      type: object
      properties:
        customProperties:
          type: object
          additionalProperties: true
          description: A dynamic set of custom properties provided by client
        value:
          type: object
          properties:
            output:
              type: object
      additionalProperties: true
      example:
        customProperties:
          technology-type: NR
          location: Dublin
        output:
  
