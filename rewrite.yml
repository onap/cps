# Import layout that matches the checkstyle CustomImportOrder rule in
# checkstyle/src/main/resources/cps-checkstyle/cps-java-style.xml:
#   customImportOrderRules = STATIC###THIRD_PARTY_PACKAGE
#   sortImportsInGroupAlphabetically = true
#   separateLineBetweenGroups = true
# i.e. all static imports first (alphabetical), one blank line, then all
# other imports together in a single alphabetical group (no java/javax split).
---
type: specs.openrewrite.org/v1beta/style
name: org.onap.cps.style.CpsImportLayout
styleConfigs:
  - org.openrewrite.java.style.ImportLayoutStyle:
      classCountToUseStarImport: 2147483647
      nameCountToUseStarImport: 2147483647
      layout:
        - import static all other imports
        - <blank line>
        - import all other imports
