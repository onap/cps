# policy, and support documentation.

name: 🔐 OpenSSF Scorecard
# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  # For Branch-Protection check. Only the default branch is supported. See
  # https://github.com/ossf/scorecard/blob/main/docs/checks.md#branch-protection
  branch_protection_rule:
  # To guarantee Maintained check is occasionally updated. See
  # https://github.com/ossf/scorecard/blob/main/docs/checks.md#maintained
  schedule:
    - cron: "50 4 * * 0"
  push:
    branches: ["main", "master"]
    paths:
      - "**"

# Declare default permissions as none.
permissions: {}

jobs:
  openssf-scorecard:
    name: "OpenSSF Scorecard"
    # yamllint disable-line rule:line-length
    uses: lfit/releng-reusable-workflows/.github/workflows/reuse-openssf-scorecard.yaml@5278f76fc1d27c49d0c9f795a6ddea65eeb5c11b  # v0.8.1
    permissions:
      security-events: write  # Upload results to code-scanning dashboard
      id-token: write  # Publish results and get a badge (publish_results)
      # Uncomment the permissions below if installing in a private repository.
      # contents: read
      # actions: read
